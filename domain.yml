slots:

  micro_quiz_active:
    type: bool
    initial_value: false
    influence_conversation: false
    mappings:
      - type: custom

  micro_quiz_answer:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  micro_quiz_topic:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  quiz_questions:
    type: any
    influence_conversation: false
    mappings:
      - type: custom

  current_question:
    type: float
    initial_value: 0
    influence_conversation: false
    mappings:
      - type: custom

  score:
    type: float
    initial_value: 0
    mappings:
      - type: custom


responses:

  utter_greet:
    - text: |
        Hello! 👋

        I am AI Compass — your conversational guide to learning Artificial Intelligence.

        We can explore:
        • AI Basics
        • AI Impact
        • AI Ethics
        • AI Bias
        • AI Risks
        • AI Regulations

        You can also take quizzes to test your understanding.

        What would you like to learn today?


  utter_goodbye:
    - text: |
        Goodbye! 👋

        Keep exploring AI responsibly and continue learning.


  utter_iamabot:
    - text: |
        I am AI Compass, a conversational AI literacy assistant built using Rasa.

        My goal is to help users understand:
        • AI concepts
        • AI ethics
        • AI bias
        • AI risks
        • AI regulations


  utter_fallback:
    - text: |
        I may not fully understand that topic yet.

        You can ask me about:
        • Machine Learning
        • Deep Learning
        • AI Ethics
        • AI Bias
        • AI Risks
        • AI Regulations
        • AI Applications

        Or type:
        • start quiz


session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

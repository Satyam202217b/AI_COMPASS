#     - intent: nlu_fallback
#     - action: utter_fallback
    
# - rule: handle quiz answers
#   steps:
#     - intent: answer_option
#     - action: action_handle_answer
- rule: greet user
  steps:
    - intent: greet
    - action: utter_greet

- rule: goodbye user
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: bot challenge
  steps:
    - intent: bot_challenge
    - action: utter_iamabot

- rule: start quiz
  steps:
    - intent: start_quiz
    - action: action_start_quiz

- rule: answer quiz
  steps:
    - intent: answer_option
    - action: action_handle_answer
    
